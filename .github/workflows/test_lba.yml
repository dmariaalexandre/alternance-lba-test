name: Test LBA Mode Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  scrape-lba:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LBA scraper
        env:
          LBA_API_TOKEN: ${{ secrets.LBA_API_TOKEN }}
          LBA_DEBUG: "true"
        run: python scraper_lba_mode.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lba-mode-${{ github.run_id }}
          path: |
            lba_mode_*.xlsx
            lba_mode_*.csv
          retention-days: 30
          if-no-files-found: warn
